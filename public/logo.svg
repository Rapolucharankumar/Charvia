<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="cGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="cGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="50%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- The Letter C Background/Shadow -->
  <path d="M 75 25 A 35 35 0 1 0 75 75 L 62 62 A 18 18 0 1 1 62 38 Z" fill="url(#cGrad1)" />
  
  <!-- Overlay to give depth -->
  <path d="M 75 75 A 35 35 0 0 1 20 65 A 35 35 0 0 0 70 80 Z" fill="url(#cGrad2)" opacity="0.6"/>

  <!-- Main Star -->
  <path d="M 50 32 Q 50 50 32 50 Q 50 50 50 68 Q 50 50 68 50 Q 50 50 50 32 Z" fill="url(#starGrad)" filter="url(#glow)" />
  
  <!-- Sparkles -->
  <circle cx="35" cy="35" r="1.5" fill="#FFF" opacity="0.8" />
  <circle cx="28" cy="60" r="1" fill="#FFF" opacity="0.6" />
  <circle cx="60" cy="30" r="1" fill="#FFF" opacity="0.6" />
  <circle cx="65" cy="70" r="1.5" fill="#FFF" opacity="0.8" />
  
  <!-- Small Star -->
  <path d="M 65 42 Q 65 46 61 46 Q 65 46 65 50 Q 65 46 69 46 Q 65 46 65 42 Z" fill="#38BDF8" opacity="0.9" />
</svg>
